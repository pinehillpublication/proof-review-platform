version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: pinehill-postgres
    environment:
      POSTGRES_DB: pinehill_proof_review
      POSTGRES_USER: pinehill_user
      POSTGRES_PASSWORD: pinehill_secure_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pinehill_user -d pinehill_proof_review"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pinehill_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pinehill-backend
    environment:
      NODE_ENV: production
      PORT: 5000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: pinehill_proof_review
      DB_USER: pinehill_user
      DB_PASSWORD: pinehill_secure_password
      JWT_SECRET: your_jwt_secret_key_min_32_chars_long
      FRONTEND_URL: http://localhost:3000
      SOCKET_IO_CORS_ORIGIN: http://localhost:3000
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/temp:/app/temp
    networks:
      - pinehill_network
    command: npm run start

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pinehill-frontend
    environment:
      REACT_APP_API_URL: http://localhost:5000
      REACT_APP_SOCKET_URL: http://localhost:5000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - pinehill_network

volumes:
  postgres_data:
    driver: local

networks:
  pinehill_network:
    driver: bridge